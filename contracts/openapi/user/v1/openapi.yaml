openapi: 3.1.0
info:
  title: PadlHub User API
  version: 1.5.0
  description: Canonical user-facing API. Public identifiers are PadlHub UUIDs.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.padlhub.ru/user/api/v1
security:
  - PadlHubUserJwt: []
paths:
  /{tenantKey}/auth/viva/authorize:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: createVivaOAuthAuthorization
      summary: Start server-owned Viva OAuth with PKCE
      description: Creates an opaque, one-time OAuth state and returns the Viva authorization URL. No Viva credential is returned.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VivaOAuthAuthorizationRequest'
      responses:
        '200':
          description: Redirect URL for the selected Viva identity provider.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VivaOAuthAuthorization'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/viva/callback:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: completeVivaOAuthAuthorization
      summary: Complete Viva OAuth callback and create a PadlHub session
      security: []
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: PadlHub refresh cookie is set and the browser is redirected to the configured cabinet URL.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '410':
          $ref: '#/components/responses/AuthenticationRejected'
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/viva/access:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: issueVivaDelegatedAccessToken
      summary: Issue a short-lived Viva user access token
      description: |
        Exchanges a one-time callback handoff or the server-encrypted Viva refresh delegation.
        The Viva refresh token is never returned. The access token is restricted to browser memory
        and the approved direct-Viva operation allowlist.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VivaDelegatedAccessRequest'
      responses:
        '200':
          description: Short-lived Viva access token for the authenticated PadlHub user.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VivaDelegatedAccess'
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '409':
          $ref: '#/components/responses/AuthenticationRejected'
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/challenges:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: createAuthChallenge
      summary: Request a provider-neutral authentication challenge
      description: |
        Starts phone authentication without exposing the active identity provider.
        The public request and response remain PadlHub-owned when that provider changes.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '202':
          description: The one-time-code challenge was accepted.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallenge'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/challenges/{challengeId}/verify:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/ChallengeId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: verifyAuthChallenge
      summary: Verify a challenge and create a PadlHub session
      description: |
        Verifies the one-time code through the active identity provider, maps the
        provider subject to a PadlHub UUID and returns only a PadlHub access JWT.
        The rotating refresh token is delivered exclusively through the HttpOnly
        `phub_refresh` cookie; external identity tokens are never returned to clients.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyAuthChallengeRequest'
      responses:
        '200':
          description: The challenge was verified and a PadlHub session was created.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedSession'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '409':
          $ref: '#/components/responses/AuthenticationRejected'
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '410':
          $ref: '#/components/responses/AuthenticationRejected'
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/session/refresh:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/RefreshSessionIntent'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: refreshAuthSession
      summary: Rotate the refresh cookie and issue a new PadlHub access JWT
      description: |
        Uses the HttpOnly `phub_refresh` cookie. The refresh credential is rotated
        through `Set-Cookie` and is never exposed in the response body.
      security:
        - PadlHubRefreshCookie: []
      responses:
        '200':
          description: The session was refreshed and its cookie was rotated.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedSession'
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '409':
          $ref: '#/components/responses/AuthenticationRejected'
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/session:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/LogoutSessionIntent'
      - $ref: '#/components/parameters/IdempotencyKey'
    delete:
      operationId: revokeAuthSession
      summary: Revoke the current PadlHub refresh session
      description: |
        Revokes the session identified by the HttpOnly `phub_refresh` cookie and
        expires that cookie. The operation never forwards an external identity token.
      security: []
      responses:
        '204':
          description: The session was revoked or was already absent.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/context:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getUserContext
      summary: Resolve the authenticated user and tenant context
      responses:
        '200':
          description: Authorized context resolved by PadlHub.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/routing-plan:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getClientRoutingPlan
      summary: Resolve the server-owned client transport plan
      description: |
        Returns a short-lived, versioned routing decision. A client may call Viva
        directly only for operations explicitly marked DIRECT_VIVA. Commands,
        unknown operations and expired plans always use the PadlHub API.
      responses:
        '200':
          description: Effective routing plan for this user, tenant and client platform.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRoutingPlan'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/profile:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getUserProfile
      summary: Load the authenticated PadlHub user profile
      description: |
        Returns one normalized profile aggregate with a PadlHub user UUID.
        The transport may be selected by the routing plan, but the public DTO is stable.
      responses:
        '200':
          description: Normalized user profile.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/bookings/upcoming:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getUpcomingBookings
      summary: Load the authenticated user's upcoming bookings
      description: |
        Returns one bookings aggregate containing PadlHub UUIDs only. Provider
        identifiers remain in integration storage and never cross this boundary.
      responses:
        '200':
          description: Upcoming bookings from one PadlHub-owned projection version.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpcomingBookings'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/home:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getHomeDashboard
      summary: Load the complete authenticated home dashboard snapshot
      description: |
        Returns every above-the-fold home block from one PadlHub-owned read model.
        Community feed, rankings, history and item details are intentionally excluded
        and loaded only after explicit navigation. Clients never fan out to Viva or
        choose a source for individual blocks.
      responses:
        '200':
          description: One consistent home dashboard snapshot.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeDashboard'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/notifications:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: listNotifications
      summary: List the authenticated user's durable in-app notifications
      description: |
        Returns only PadlHub-owned inbox state for the JWT subject. The cursor is opaque,
        pagination is newest-first, and unreadCount is calculated independently of the page.
        The route stays closed until in-app notifications are enabled for the tenant.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: cursor
          in: query
          required: false
          description: Opaque cursor returned by the preceding page.
          schema:
            type: string
            minLength: 16
            maxLength: 512
      responses:
        '200':
          description: One tenant/user-scoped page of in-app notifications.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationInboxPage'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/notifications/read-cursor:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    put:
      operationId: updateNotificationReadCursor
      summary: Mark in-app notifications as read through one inbox item
      description: |
        Monotonically advances the authenticated user's cursor and marks every older unread item
        in the same transaction. Repeating the same Idempotency-Key returns the stored result;
        reusing it with another throughId is rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationReadCursorRequest'
      responses:
        '200':
          description: Stored result of the idempotent cursor command.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationReadCursorResult'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '409':
          $ref: '#/components/responses/CommandConflict'
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
components:
  schemas:
    ClientRoutingPlan:
      type: object
      additionalProperties: false
      required: [revision, mode, issuedAt, expiresAt, operations]
      properties:
        revision:
          type: string
          pattern: '^[0-9]+$'
        mode:
          type: string
          enum: [PADLHUB_ONLY, MIXED_END_USER_READS]
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        operations:
          type: array
          minItems: 5
          maxItems: 5
          items:
            $ref: '#/components/schemas/ClientRoutingOperationPlan'
        directViva:
          $ref: '#/components/schemas/DirectVivaTransport'
    ClientRoutingOperationPlan:
      type: object
      additionalProperties: false
      required: [operation, transport, fallback]
      properties:
        operation:
          type: string
          enum:
            [profile.read, bookings.read, bookings.details.read, subscriptions.read, schedule.read]
        transport:
          type: string
          enum: [PADLHUB_API, DIRECT_VIVA]
        fallback:
          type: string
          enum: [PADLHUB_API, UNAVAILABLE]
    DirectVivaTransport:
      type: object
      additionalProperties: false
      required: [apiBaseUrl, providerTenantKey, accessTokenPath, allowedRequestHeaders]
      properties:
        apiBaseUrl:
          type: string
          format: uri
        providerTenantKey:
          type: string
          minLength: 1
          maxLength: 128
        accessTokenPath:
          type: string
          const: /auth/viva/access
        allowedRequestHeaders:
          type: array
          minItems: 1
          maxItems: 1
          prefixItems:
            - type: string
              const: Authorization
          items: false
    UserProfile:
      $ref: '#/components/schemas/HomeProfile'
    AuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [method, phone]
      properties:
        method:
          type: string
          const: phone_otp
          description: Product-level authentication method; never an upstream provider name.
        phone:
          type: string
          pattern: '^\+7[0-9]{10}$'
          description: Phone number in E.164 format.
          example: '+79991234567'
    AuthChallenge:
      type: object
      additionalProperties: false
      required: [challengeId, expiresAt, resendAfterSeconds]
      properties:
        challengeId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
        resendAfterSeconds:
          type: integer
          minimum: 0
          maximum: 3600
    VerifyAuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          pattern: '^[0-9]{4}$'
          description: One-time code supplied to the user.
    VivaOAuthAuthorizationRequest:
      type: object
      additionalProperties: false
      required: [provider, acceptance]
      properties:
        provider:
          type: string
          enum: [vkid, yandex]
        acceptance:
          type: object
          additionalProperties: false
          required: [publicOfferAccepted, personalDataPolicyAccepted]
          properties:
            publicOfferAccepted:
              type: boolean
              const: true
            personalDataPolicyAccepted:
              type: boolean
              const: true
    VivaOAuthAuthorization:
      type: object
      additionalProperties: false
      required: [redirectUrl]
      properties:
        redirectUrl:
          type: string
          format: uri
    VivaDelegatedAccessRequest:
      type: object
      additionalProperties: false
      properties:
        handoffCode:
          type: string
          minLength: 20
          maxLength: 256
          description: One-time opaque callback handoff. Omit to refresh the stored delegation.
    VivaDelegatedAccess:
      type: object
      additionalProperties: false
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
          minLength: 20
          maxLength: 8192
          description: Short-lived Viva user access token. Never persist outside browser memory.
        expiresAt:
          type: string
          format: date-time
    AuthenticatedSession:
      type: object
      additionalProperties: false
      required: [accessToken, tokenType, expiresAt, user, context]
      properties:
        accessToken:
          type: string
          minLength: 20
          maxLength: 8192
          description: Short-lived PadlHub JWT with audience `phub-api`.
        tokenType:
          type: string
          const: Bearer
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        context:
          $ref: '#/components/schemas/UserContext'
    AuthenticatedUser:
      type: object
      additionalProperties: false
      required: [id, displayName]
      properties:
        id:
          type: string
          format: uuid
          description: Stable PadlHub user identifier.
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        firstName:
          type: [string, 'null']
          maxLength: 100
        lastName:
          type: [string, 'null']
          maxLength: 100
        avatarUrl:
          type: [string, 'null']
          format: uri
    UserContext:
      type: object
      additionalProperties: false
      required: [tenantId, userId, displayName, roles, permissions]
      properties:
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        phoneLast4:
          type: string
          pattern: '^[0-9]{4}$'
          description: Last four digits only; the access JWT and context never expose the full phone.
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    HomeDashboard:
      type: object
      additionalProperties: false
      required:
        [
          snapshot,
          profile,
          counters,
          quickActions,
          upcoming,
          subscriptions,
          communities,
          promotion,
          locations,
          additionalLinks,
          capabilities,
        ]
      properties:
        snapshot:
          $ref: '#/components/schemas/HomeSnapshot'
        profile:
          $ref: '#/components/schemas/HomeProfile'
        counters:
          $ref: '#/components/schemas/HomeCounters'
        quickActions:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/HomeQuickAction'
        upcoming:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeUpcomingItem'
        subscriptions:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeSubscription'
        communities:
          type: array
          maxItems: 8
          items:
            $ref: '#/components/schemas/HomeCommunity'
        promotion:
          oneOf:
            - $ref: '#/components/schemas/HomePromotion'
            - type: 'null'
        locations:
          type: array
          maxItems: 8
          items:
            $ref: '#/components/schemas/HomeLocation'
        additionalLinks:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeAdditionalLink'
        capabilities:
          $ref: '#/components/schemas/HomeCapabilities'
    HomeSnapshot:
      type: object
      additionalProperties: false
      required: [version, generatedAt, staleAt, source]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 100
        generatedAt:
          type: string
          format: date-time
        staleAt:
          type: string
          format: date-time
        source:
          type: string
          enum: [LOCAL_PROJECTION, LOCAL_MOCK]
          description: Server-owned read-model source; clients must not branch on this value.
    HomeProfile:
      type: object
      additionalProperties: false
      required: [userId, displayName, balanceMinor, currency, level]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        firstName:
          type: [string, 'null']
          maxLength: 100
        avatarUrl:
          type: [string, 'null']
          format: uri
        phoneLast4:
          type: string
          pattern: '^[0-9]{4}$'
        balanceMinor:
          type: integer
          description: Signed balance in minor currency units; a negative value represents debt.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        level:
          $ref: '#/components/schemas/HomePlayerLevel'
    HomePlayerLevel:
      type: object
      additionalProperties: false
      required: [label, value, assessmentRequired]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 20
        value:
          type: number
          minimum: 0
          maximum: 10
        assessmentRequired:
          type: boolean
    HomeCounters:
      type: object
      additionalProperties: false
      required: [unreadChats, upcomingEvents, activeSubscriptions]
      properties:
        unreadChats:
          type: integer
          minimum: 0
        upcomingEvents:
          type: integer
          minimum: 0
        activeSubscriptions:
          type: integer
          minimum: 0
    HomeQuickAction:
      type: object
      additionalProperties: false
      required: [id, title, route, tone]
      properties:
        id:
          type: string
          enum: [play, group_training, tournament, individual_training]
        title:
          type: string
          minLength: 1
          maxLength: 80
        subtitle:
          type: [string, 'null']
          maxLength: 120
        route:
          type: string
          pattern: '^/'
        tone:
          type: string
          enum: [violet, lime, mint, sand]
    HomeUpcomingItem:
      type: object
      additionalProperties: false
      required: [id, kind, title, startsAt, venue, status, route]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [game, training, tournament]
        title:
          type: string
          minLength: 1
          maxLength: 160
        startsAt:
          type: string
          format: date-time
        venue:
          type: string
          minLength: 1
          maxLength: 160
        status:
          type: string
          enum: [confirmed, waitlist, payment_required]
        route:
          type: string
          pattern: '^/'
    UserUpcomingBookings:
      type: object
      additionalProperties: false
      required: [version, generatedAt, staleAt, items]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 100
        generatedAt:
          type: string
          format: date-time
        staleAt:
          type: string
          format: date-time
        items:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeUpcomingItem'
    HomeSubscription:
      type: object
      additionalProperties: false
      required: [id, title, status, remainingUnits, validUntil, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 160
        status:
          type: string
          enum: [active, scheduled, paused, exhausted, expired]
        remainingUnits:
          type: integer
          minimum: 0
        validUntil:
          type: [string, 'null']
          format: date-time
        route:
          type: string
          pattern: '^/'
    HomeCommunity:
      type: object
      additionalProperties: false
      required: [id, title, memberCount, role, unreadCount, accent, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: [string, 'null']
          maxLength: 220
        memberCount:
          type: integer
          minimum: 1
        role:
          type: string
          enum: [owner, admin, moderator, member]
        unreadCount:
          type: integer
          minimum: 0
        accent:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
        logoUrl:
          type: [string, 'null']
          format: uri
        route:
          type: string
          pattern: '^/'
    HomePromotion:
      type: object
      additionalProperties: false
      required: [id, eyebrow, title, description, actionLabel, route, tone]
      properties:
        id:
          type: string
          format: uuid
        eyebrow:
          type: string
          minLength: 1
          maxLength: 40
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          minLength: 1
          maxLength: 220
        actionLabel:
          type: string
          minLength: 1
          maxLength: 60
        route:
          type: string
          pattern: '^/'
        tone:
          type: string
          enum: [violet, lime, mint, sand]
        imageUrl:
          type: [string, 'null']
          format: uri
    HomeLocation:
      type: object
      additionalProperties: false
      required: [id, title, courtCount, imageUrl, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 120
        courtCount:
          type: integer
          minimum: 1
        imageUrl:
          type: [string, 'null']
          format: uri
        route:
          type: string
          pattern: '^/'
    HomeAdditionalLink:
      type: object
      additionalProperties: false
      required: [id, title, route]
      properties:
        id:
          type: string
          enum: [promotions, gift_certificates, offers]
        title:
          type: string
          minLength: 1
          maxLength: 80
        route:
          type: string
          pattern: '^/'
    HomeCapabilities:
      type: object
      additionalProperties: false
      required: [canCreateGame, canManageTournaments, canViewCommunities]
      properties:
        canCreateGame:
          type: boolean
        canManageTournaments:
          type: boolean
        canViewCommunities:
          type: boolean
    NotificationInboxPage:
      type: object
      additionalProperties: false
      required: [items, unreadCount]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/NotificationInboxItem'
        unreadCount:
          type: integer
          minimum: 0
        nextCursor:
          type: string
          minLength: 16
          maxLength: 512
    NotificationInboxItem:
      type: object
      additionalProperties: false
      required: [id, category, title, body, createdAt]
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{1,63}$'
        title:
          type: string
          minLength: 1
          maxLength: 300
        body:
          type: string
          minLength: 1
          maxLength: 8000
        deepLink:
          type: string
          pattern: '^/'
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
    NotificationReadCursorRequest:
      type: object
      additionalProperties: false
      required: [throughId]
      properties:
        throughId:
          type: string
          format: uuid
    NotificationReadCursorResult:
      type: object
      additionalProperties: false
      required: [outcome, readThrough, changedCount, replayed]
      properties:
        outcome:
          type: string
          const: updated
        readThrough:
          $ref: '#/components/schemas/NotificationInboxPosition'
        changedCount:
          type: integer
          minimum: 0
        replayed:
          type: boolean
    NotificationInboxPosition:
      type: object
      additionalProperties: false
      required: [id, createdAt]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable client operation key used for retry-safe authentication commands.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9._:-]+$'
    ChallengeId:
      name: challengeId
      in: path
      required: true
      description: Opaque PadlHub authentication challenge UUID.
      schema:
        type: string
        format: uuid
    RefreshSessionIntent:
      name: X-Session-Intent
      in: header
      required: true
      description: Explicit refresh intent required alongside the HttpOnly cookie.
      schema:
        type: string
        const: refresh
    LogoutSessionIntent:
      name: X-Session-Intent
      in: header
      required: true
      description: Explicit logout intent required alongside the HttpOnly cookie.
      schema:
        type: string
        const: logout
  headers:
    RefreshCookie:
      description: |
        Rotated or expired `phub_refresh` cookie. It is HttpOnly and SameSite;
        production also sets Secure. Browser JavaScript cannot read its value.
      required: true
      schema:
        type: string
  responses:
    CommandConflict:
      description: The idempotency key was already used for another command.
      headers:
        X-Correlation-ID:
          $ref: ../../common/components.yaml#/components/headers/CorrelationId
      content:
        application/json:
          schema:
            $ref: ../../common/components.yaml#/components/schemas/ApiError
    AuthenticationRejected:
      description: The challenge, refresh cookie or PadlHub session credential is invalid.
      headers:
        X-Correlation-ID:
          $ref: ../../common/components.yaml#/components/headers/CorrelationId
      content:
        application/json:
          schema:
            $ref: ../../common/components.yaml#/components/schemas/ApiError
  securitySchemes:
    PadlHubUserJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: PadlHub-issued JWT; audience phub-api, UUID subject and authorized tenant UUIDs.
    PadlHubRefreshCookie:
      type: apiKey
      in: cookie
      name: phub_refresh
      description: Rotating PadlHub refresh credential stored only as an HttpOnly cookie.

name: phub-staging

x-runtime: &runtime
  env_file:
    - ${RUNTIME_ENV_FILE:-/etc/phub/staging.env}
  restart: unless-stopped
  networks:
    - application

services:
  web:
    <<: *runtime
    image: ${REGISTRY}/phub-web@${WEB_IMAGE_DIGEST}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    <<: *runtime
    image: ${REGISTRY}/phub-api@${API_IMAGE_DIGEST}
    ports:
      - '127.0.0.1:3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  realtime:
    <<: *runtime
    image: ${REGISTRY}/phub-realtime@${REALTIME_IMAGE_DIGEST}
    ports:
      - '127.0.0.1:3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *runtime
    image: ${REGISTRY}/phub-worker@${WORKER_IMAGE_DIGEST}
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
      S3_REGION: us-east-1
      S3_BUCKET: phub-media
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      S3_FORCE_PATH_STYLE: 'true'
      S3_AUTO_CREATE_BUCKET: 'true'

  migrator:
    <<: *runtime
    image: ${REGISTRY}/phub-migrator@${MIGRATOR_IMAGE_DIGEST}
    restart: 'no'
    profiles: [migration]

networks:
  application:
    external: true
    name: phub-private

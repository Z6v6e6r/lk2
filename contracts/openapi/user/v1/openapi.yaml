openapi: 3.1.0
info:
  title: PadlHub User API
  version: 1.11.0
  description: Canonical user-facing API. Public identifiers are PadlHub UUIDs.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.padlhub.ru/user/api/v1
security:
  - PadlHubUserJwt: []
tags:
  - name: profiles
    description: Viewer-filtered profiles and owner-managed privacy policy.
  - name: games
    description: Viewer-aware game reads and explicit idempotent commands.
  - name: locations
    description: Published PadlHub location cards and detail views.
paths:
  /{tenantKey}/auth/viva/authorize:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: createVivaOAuthAuthorization
      summary: Start server-owned Viva OAuth with PKCE
      description: Creates an opaque, one-time OAuth state and returns the Viva authorization URL. No Viva credential is returned.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VivaOAuthAuthorizationRequest'
      responses:
        '200':
          description: Redirect URL for the selected Viva identity provider.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VivaOAuthAuthorization'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/viva/callback:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: completeVivaOAuthAuthorization
      summary: Complete Viva OAuth callback and create a PadlHub session
      security: []
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: PadlHub refresh cookie is set and the browser is redirected to the configured cabinet URL.
          headers:
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '410':
          $ref: '#/components/responses/AuthenticationRejected'
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/viva/access:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: issueVivaDelegatedAccessToken
      summary: Issue a short-lived Viva user access token
      description: |
        Exchanges a one-time callback handoff or the server-encrypted Viva refresh delegation.
        The Viva refresh token is never returned. The access token is restricted to browser memory
        and the approved direct-Viva operation allowlist.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VivaDelegatedAccessRequest'
      responses:
        '200':
          description: Short-lived Viva access token for the authenticated PadlHub user.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VivaDelegatedAccess'
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '409':
          $ref: '#/components/responses/AuthenticationRejected'
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/challenges:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: createAuthChallenge
      summary: Request a provider-neutral authentication challenge
      description: |
        Starts phone authentication without exposing the active identity provider.
        The public request and response remain PadlHub-owned when that provider changes.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '202':
          description: The one-time-code challenge was accepted.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallenge'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/challenges/{challengeId}/verify:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/ChallengeId'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: verifyAuthChallenge
      summary: Verify a challenge and create a PadlHub session
      description: |
        Verifies the one-time code through the active identity provider, maps the
        provider subject to a PadlHub UUID and returns only a PadlHub access JWT.
        The rotating refresh token is delivered exclusively through the HttpOnly
        `phub_refresh` cookie; external identity tokens are never returned to clients.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyAuthChallengeRequest'
      responses:
        '200':
          description: The challenge was verified and a PadlHub session was created.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedSession'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '409':
          $ref: '#/components/responses/AuthenticationRejected'
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '410':
          $ref: '#/components/responses/AuthenticationRejected'
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/session/refresh:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/RefreshSessionIntent'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      operationId: refreshAuthSession
      summary: Rotate the refresh cookie and issue a new PadlHub access JWT
      description: |
        Uses the HttpOnly `phub_refresh` cookie. The refresh credential is rotated
        through `Set-Cookie` and is never exposed in the response body.
      security:
        - PadlHubRefreshCookie: []
      responses:
        '200':
          description: The session was refreshed and its cookie was rotated.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedSession'
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '409':
          $ref: '#/components/responses/AuthenticationRejected'
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/auth/session:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/LogoutSessionIntent'
      - $ref: '#/components/parameters/IdempotencyKey'
    delete:
      operationId: revokeAuthSession
      summary: Revoke the current PadlHub refresh session
      description: |
        Revokes the session identified by the HttpOnly `phub_refresh` cookie and
        expires that cookie. The operation never forwards an external identity token.
      security: []
      responses:
        '204':
          description: The session was revoked or was already absent.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            Set-Cookie:
              $ref: '#/components/headers/RefreshCookie'
        '401':
          $ref: '#/components/responses/AuthenticationRejected'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/context:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getUserContext
      summary: Resolve the authenticated user and tenant context
      responses:
        '200':
          description: Authorized context resolved by PadlHub.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContext'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/routing-plan:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getClientRoutingPlan
      summary: Resolve the server-owned client transport plan
      description: |
        Returns a short-lived, versioned routing decision. A client may call Viva
        directly only for operations explicitly marked DIRECT_VIVA. Commands,
        unknown operations and expired plans always use the PadlHub API.
      responses:
        '200':
          description: Effective routing plan for this user, tenant and client platform.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRoutingPlan'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/profile:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getUserProfile
      summary: Load the authenticated PadlHub user profile
      description: |
        Returns one normalized profile aggregate with a PadlHub user UUID.
        The transport may be selected by the routing plan, but the public DTO is stable.
      responses:
        '200':
          description: Normalized user profile.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/profile/privacy:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      tags: [profiles]
      operationId: getProfilePrivacySettings
      summary: Load the authenticated user's profile privacy settings
      description: Missing persisted settings allow actions only after a separate server-side access decision.
      responses:
        '200':
          description: Current versioned owner privacy policy.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePrivacySettings'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
    put:
      tags: [profiles]
      operationId: updateProfilePrivacySettings
      summary: Replace the authenticated user's profile privacy settings
      description: |
        Applies an optimistic, idempotent owner command. The policy can only control mediated
        contact and direct-chat capabilities; raw phone or account data is never disclosed.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfilePrivacyUpdateRequest'
      responses:
        '200':
          description: Persisted privacy settings. An idempotent replay returns the same version.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
            X-Idempotent-Replayed:
              description: Whether the stored result was replayed for the same command key.
              schema:
                type: string
                enum: ['true', 'false']
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePrivacySettings'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '409':
          $ref: '#/components/responses/CommandConflict'
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/profiles/{userId}:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - name: userId
        in: path
        required: true
        description: Stable PadlHub UUID of the profile owner.
        schema:
          type: string
          format: uuid
    get:
      operationId: getPlayerProfileView
      summary: Load a viewer-filtered player profile
      description: |
        Returns only fields that the authenticated viewer may receive. Self-only account data is
        emitted in `privateAccount`; other users never receive it. Contact and direct-chat access
        are server-derived capabilities. This contract intentionally does not define which product
        or account state grants them. The client must not infer access from player data and every
        eventual contact/chat command must revalidate the current server-side permission.
      responses:
        '200':
          description: Viewer-filtered profile and server-derived action capabilities.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerProfileView'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/bookings/upcoming:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getUpcomingBookings
      summary: Load the authenticated user's upcoming bookings
      description: |
        Returns one bookings aggregate containing PadlHub UUIDs only. Provider
        identifiers remain in integration storage and never cross this boundary.
      responses:
        '200':
          description: Upcoming bookings from one PadlHub-owned projection version.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpcomingBookings'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/home:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: getHomeDashboard
      summary: Load the complete authenticated home dashboard snapshot
      description: |
        Returns every above-the-fold home block from one PadlHub-owned read model.
        Community feed, rankings, history and item details are intentionally excluded
        and loaded only after explicit navigation. Clients never fan out to Viva or
        choose a source for individual blocks.
      responses:
        '200':
          description: One consistent home dashboard snapshot.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeDashboard'
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/communities/mine:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: listMyCommunities
      summary: List active community memberships for the authenticated user
      description: |
        Returns PadlHub community UUIDs only. The cursor is opaque and follows the server-owned
        order: pinned memberships first, then latest activity. During migration the server may
        normalize this read from the current LK community store; clients never call that store or
        provide phone, clientId or another identity selector.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            minLength: 16
            maxLength: 512
      responses:
        '200':
          description: One page of active community memberships.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityMembershipPage'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/notifications:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      operationId: listNotifications
      summary: List the authenticated user's durable in-app notifications
      description: |
        Returns only PadlHub-owned inbox state for the JWT subject. The cursor is opaque,
        pagination is newest-first, and unreadCount is calculated independently of the page.
        The route stays closed until in-app notifications are enabled for the tenant.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: cursor
          in: query
          required: false
          description: Opaque cursor returned by the preceding page.
          schema:
            type: string
            minLength: 16
            maxLength: 512
      responses:
        '200':
          description: One tenant/user-scoped page of in-app notifications.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationInboxPage'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
  /{tenantKey}/notifications/read-cursor:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/IdempotencyKey'
    put:
      operationId: updateNotificationReadCursor
      summary: Mark in-app notifications as read through one inbox item
      description: |
        Monotonically advances the authenticated user's cursor and marks every older unread item
        in the same transaction. Repeating the same Idempotency-Key returns the stored result;
        reusing it with another throughId is rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationReadCursorRequest'
      responses:
        '200':
          description: Stored result of the idempotent cursor command.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationReadCursorResult'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':

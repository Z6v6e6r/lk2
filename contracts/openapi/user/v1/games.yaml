  /{tenantKey}/recommendations/bookings:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      tags: [bookings]
      operationId: listBookingRecommendations
      summary: List server-ranked booking opportunities for the authenticated user
      description: |
        Reads one versioned PadlHub projection result. The server applies level, explicit
        station/time preferences and eligible completed Games history without exposing scores,
        provider identifiers or subscription state.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 6
      responses:
        '200':
          description: Ranked, explainable recommendations from current Games projections.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingRecommendationPage'

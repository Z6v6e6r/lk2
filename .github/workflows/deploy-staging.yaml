name: Build and deploy staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [web, api, worker, realtime, migrator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/z6v6e6r/phub-${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - run: |
          mkdir -p digests
          printf '%s' '${{ steps.image.outputs.digest }}' > digests/${{ matrix.service }}
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service }}
          path: digests/${{ matrix.service }}
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: digests
          merge-multiple: true
      - name: Join the staging tailnet
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: ${{ secrets.STAGING_HOST }}
      - name: Configure audited SSH
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Install release and ingress definitions
        env:
          HOST: ${{ secrets.STAGING_HOST }}
        run: |
          scp deploy/compose.staging.yaml "phub-deploy@$HOST:/opt/phub/compose.yaml"
          scp deploy/jetson/nginx/default.conf "phub-deploy@$HOST:/opt/phub/nginx/default.conf"
          {
            echo "REGISTRY=ghcr.io/z6v6e6r"
            echo "WEB_IMAGE_DIGEST=$(cat digests/web)"
            echo "API_IMAGE_DIGEST=$(cat digests/api)"
            echo "WORKER_IMAGE_DIGEST=$(cat digests/worker)"
            echo "REALTIME_IMAGE_DIGEST=$(cat digests/realtime)"
            echo "MIGRATOR_IMAGE_DIGEST=$(cat digests/migrator)"
            echo "RELEASE=${{ github.sha }}"
          } > release.env
          scp release.env "phub-deploy@$HOST:/opt/phub/release.env"
      - name: Pull, migrate and deploy the same image digests
        env:
          HOST: ${{ secrets.STAGING_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "phub-deploy@$HOST" '
            set -eu
            trap "docker logout ghcr.io >/dev/null 2>&1 || true" EXIT
            docker login ghcr.io --username "${{ github.actor }}" --password-stdin
            cd /opt/phub
            docker compose --env-file release.env pull
            docker compose --env-file release.env --profile migration run --rm migrator
            docker compose --env-file release.env up -d --remove-orphans
            # The ingress configuration is bind-mounted. Recreate this one
            # stateless container so it loads the newly copied configuration.
            docker compose --env-file infrastructure.env -f compose.infrastructure.yaml up -d --force-recreate nginx
          '
      - name: Verify the web entrypoint
        env:
          SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
        run: |
          curl --fail --silent --show-error "$SMOKE_BASE_URL/" | grep -q 'id="phub-app"'
      - name: Staging smoke test
        env:
          SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
        run: npm ci --ignore-scripts && npm run smoke

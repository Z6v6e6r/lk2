      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/GameId'
    post:
      tags: [games]
      operationId: joinGame
      summary: Reserve or occupy one game seat
      description: |
        The server locks the game and derives identity, capacity, cutoff and payment policy. The
        caller cannot submit roster arrays or claim another user.

name: Android internal build

on:
  workflow_dispatch:
  push:
    tags: ['mobile-v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: mobile-android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: test -d apps/mobile/android || { echo 'Generate and review the native Android project first.'; exit 1; }
      - run: npm ci
      - run: npm run build -w @phub/mobile && npm run cap:sync -w @phub/mobile
      - run: cd apps/mobile/android && ./gradlew bundleRelease

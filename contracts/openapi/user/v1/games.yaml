paths:
  /{tenantKey}/games:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
    get:
      tags: [games]
      operationId: listMyGames
      summary: List viewer-aware game cards
      description: |
        Returns one tenant/user-scoped card projection version. Identity comes only from the
        verified PadlHub JWT; phone, clientId and provider identifiers are not accepted.
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [UPCOMING, HISTORY]
            default: UPCOMING
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: cursor
          in: query
          required: false
          description: Opaque keyset cursor returned by the preceding page.
          schema:
            type: string
            minLength: 16
            maxLength: 512
      responses:
        '200':
          description: One page of viewer-aware cards from a consistent projection revision.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameCardPage'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable
    post:
      tags: [games]
      operationId: createGame
      summary: Start idempotent game creation
      description: |
        Commits the PadlHub command and returns a durable operation. Booking and payment provider
        work continues asynchronously; a browser redirect never marks the operation paid.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGameRequest'
      responses:
        '202':
          $ref: '#/components/responses/GameCommandAccepted'
        '400':
          $ref: ../../common/components.yaml#/components/responses/BadRequest
        '401':
          $ref: ../../common/components.yaml#/components/responses/Unauthorized
        '403':
          $ref: ../../common/components.yaml#/components/responses/Forbidden
        '404':
          $ref: ../../common/components.yaml#/components/responses/NotFound
        '409':
          $ref: '#/components/responses/GameCommandRejected'
        '429':
          $ref: ../../common/components.yaml#/components/responses/TooManyRequests
        '503':
          $ref: ../../common/components.yaml#/components/responses/ServiceUnavailable

  /{tenantKey}/games/{gameId}:
    parameters:
      - $ref: ../../common/components.yaml#/components/parameters/TenantKey
      - $ref: ../../common/components.yaml#/components/parameters/CorrelationId
      - $ref: '#/components/parameters/GameId'
    get:
      tags: [games]
      operationId: getGame
      summary: Get viewer-aware game details
      description: Returns one aggregate/card projection revision and server-computed actions.
      responses:
        '200':
          description: Viewer-filtered game details.
          headers:
            X-Correlation-ID:
              $ref: ../../common/components.yaml#/components/headers/CorrelationId
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameCardResponse'

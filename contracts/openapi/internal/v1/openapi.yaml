openapi: 3.1.0
info:
  title: PadlHub Internal API
  version: 1.0.0
  description: Service-only boundary; never exposed to web, mobile, Tilda or CUP clients.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://internal.padlhub.ru/internal/api/v1
security:
  - PadlHubInternalJwt: []
tags:
  - name: games
    description: Service-only Games commands and outbox diagnostics.
paths:
  /{tenantKey}/game-commands:
    $ref: ./games.yaml#/paths/~1{tenantKey}~1game-commands
  /{tenantKey}/game-events/{eventId}:
    $ref: ./games.yaml#/paths/~1{tenantKey}~1game-events~1{eventId}
components:
  securitySchemes:
    PadlHubInternalJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived service JWT with the dedicated phub-internal audience.

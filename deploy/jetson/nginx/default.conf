server {
    listen 80 default_server;
    server_name _;

    # Application containers are started by a separate Compose project. Resolve
    # their names at request time so Nginx stays healthy before the first release.
    resolver 127.0.0.11 ipv6=off valid=10s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok\n';
    }

    location ~ ^/(health(?:/|$)|user/api/) {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
    }

    location ^~ /realtime/ {
        set $realtime_upstream http://realtime:3001;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_read_timeout 65s;
        proxy_pass $realtime_upstream;
    }

    location / {
        set $web_upstream http://web:8080;
        proxy_pass $web_upstream;
    }
}

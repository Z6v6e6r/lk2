components:
  schemas:
    ClientRoutingPlan:
      type: object
      additionalProperties: false
      required: [revision, mode, issuedAt, expiresAt, operations]
      properties:
        revision:
          type: string
          pattern: '^[0-9]+$'
        mode:
          type: string
          enum: [PADLHUB_ONLY, MIXED_END_USER_READS]
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        operations:
          type: array
          minItems: 5
          maxItems: 5
          items:
            $ref: '#/components/schemas/ClientRoutingOperationPlan'
        directViva:
          $ref: '#/components/schemas/DirectVivaTransport'
    ClientRoutingOperationPlan:
      type: object
      additionalProperties: false
      required: [operation, transport, fallback]
      properties:
        operation:
          type: string
          enum:
            [profile.read, bookings.read, bookings.details.read, subscriptions.read, schedule.read]
        transport:
          type: string
          enum: [PADLHUB_API, DIRECT_VIVA]
        fallback:
          type: string
          enum: [PADLHUB_API, UNAVAILABLE]
    DirectVivaTransport:
      type: object
      additionalProperties: false
      required: [apiBaseUrl, providerTenantKey, accessTokenPath, allowedRequestHeaders]
      properties:
        apiBaseUrl:
          type: string
          format: uri
        providerTenantKey:
          type: string
          minLength: 1
          maxLength: 128
        accessTokenPath:
          type: string
          const: /auth/viva/access
        allowedRequestHeaders:
          type: array
          minItems: 1
          maxItems: 1
          prefixItems:
            - type: string
              const: Authorization
          items: false
    UserProfile:
      $ref: '#/components/schemas/HomeProfile'
    ProfilePrivacySettings:
      type: object
      additionalProperties: false
      required: [contactPolicy, chatPolicy, version, updatedAt]
      properties:
        contactPolicy:
          $ref: '#/components/schemas/ProfileActionPolicy'
        chatPolicy:
          $ref: '#/components/schemas/ProfileActionPolicy'
        version:
          type: integer
          minimum: 0
          description: Zero means no explicit row exists and server defaults are in effect.
        updatedAt:
          type: [string, 'null']
          format: date-time
    ProfilePrivacyUpdateRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, contactPolicy, chatPolicy]
      properties:
        expectedVersion:
          type: integer
          minimum: 0
        contactPolicy:
          $ref: '#/components/schemas/ProfileActionPolicy'
        chatPolicy:
          $ref: '#/components/schemas/ProfileActionPolicy'
    ProfileActionPolicy:
      type: string
      enum: [AUTHORIZED, NOBODY]
      description: Target-owner policy evaluated after a separate server-side access decision.
    PlayerProfileView:
      type: object
      additionalProperties: false
      required: [profile, access]
      properties:
        profile:
          $ref: '#/components/schemas/PlayerProfile'
        privateAccount:
          $ref: '#/components/schemas/PlayerPrivateAccount'
        access:
          $ref: '#/components/schemas/PlayerProfileAccess'
    PlayerProfile:
      type: object
      additionalProperties: false
      required: [userId, displayName, level]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        firstName:
          type: [string, 'null']
          maxLength: 100
        avatarUrl:
          type: [string, 'null']
          format: uri
        level:
          $ref: '#/components/schemas/PlayerProfileLevel'
    PlayerProfileLevel:
      type: object
      additionalProperties: false
      required: [label, assessmentRequired]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 20
        value:
          type: number
          minimum: 0
          maximum: 10
          description: Omitted unless the viewer has extended-profile access.
        assessmentRequired:
          type: boolean
    PlayerPrivateAccount:
      type: object
      additionalProperties: false
      required: [balanceMinor, currency]
      description: Self-only fields; the property is omitted for every other viewer.
      properties:
        phoneLast4:
          type: string
          pattern: '^[0-9]{4}$'
        balanceMinor:
          type: integer
          description: Signed balance in minor currency units.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
    PlayerProfileAccess:
      type: object
      additionalProperties: false
      required: [audience, tier, visibleSections, contact, chat]
      properties:
        audience:
          type: string
          enum: [SELF, OTHER]
        tier:
          type: string
          enum: [BASIC, EXTENDED, INTERACTION, SELF]
          description: Server-derived viewer tier; never calculated from fields in the browser.
        visibleSections:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [BASIC, PLAYER_LEVEL, PLAYER_RATING, PRIVATE_ACCOUNT]
        contact:
          $ref: '#/components/schemas/ProfileActionCapability'
        chat:
          $ref: '#/components/schemas/ProfileActionCapability'
    ProfileActionCapability:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [AVAILABLE, LOCKED, HIDDEN]
        reason:
          type: string
          enum: [ACCESS_REQUIRED, PROFILE_RESTRICTED, SELF_PROFILE]
        route:
          type: string
          pattern: '^/'
          description: Present only when the action is available; generated by PadlHub.
    AuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [method, phone]
      properties:
        method:
          type: string
          const: phone_otp
          description: Product-level authentication method; never an upstream provider name.
        phone:
          type: string
          pattern: '^\+7[0-9]{10}$'
          description: Phone number in E.164 format.
          example: '+79991234567'
    AuthChallenge:
      type: object
      additionalProperties: false
      required: [challengeId, expiresAt, resendAfterSeconds]
      properties:
        challengeId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
        resendAfterSeconds:
          type: integer
          minimum: 0
          maximum: 3600
    VerifyAuthChallengeRequest:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          pattern: '^[0-9]{4}$'
          description: One-time code supplied to the user.
        acceptance:
          type: object
          additionalProperties: false
          description: |
            Required for client sessions and rejected unless both values are true.
            CUP admin authentication does not create a consumer legal acceptance.
          required: [publicOfferAccepted, personalDataPolicyAccepted]
          properties:
            publicOfferAccepted:
              type: boolean
              const: true
            personalDataPolicyAccepted:
              type: boolean
              const: true
    VivaOAuthAuthorizationRequest:
      type: object
      additionalProperties: false
      required: [provider, acceptance]
      properties:
        provider:
          type: string
          enum: [vkid, yandex]
        acceptance:
          type: object
          additionalProperties: false
          required: [publicOfferAccepted, personalDataPolicyAccepted]
          properties:
            publicOfferAccepted:
              type: boolean
              const: true
            personalDataPolicyAccepted:
              type: boolean
              const: true
    VivaOAuthAuthorization:
      type: object
      additionalProperties: false
      required: [redirectUrl]
      properties:
        redirectUrl:
          type: string
          format: uri
    VivaDelegatedAccessRequest:
      type: object
      additionalProperties: false
      properties:
        handoffCode:
          type: string
          minLength: 20
          maxLength: 256
          description: One-time opaque callback handoff. Omit to refresh the stored delegation.
    VivaDelegatedAccess:
      type: object
      additionalProperties: false
      required: [accessToken, expiresAt]
      properties:
        accessToken:
          type: string
          minLength: 20
          maxLength: 8192
          description: Short-lived Viva user access token. Never persist outside browser memory.
        expiresAt:
          type: string
          format: date-time
    AuthenticatedSession:
      type: object
      additionalProperties: false
      required: [accessToken, tokenType, expiresAt, user, context]
      properties:
        accessToken:
          type: string
          minLength: 20
          maxLength: 8192
          description: Short-lived PadlHub JWT with audience `phub-api`.
        tokenType:
          type: string
          const: Bearer
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/AuthenticatedUser'
        context:
          $ref: '#/components/schemas/UserContext'
    AuthenticatedUser:
      type: object
      additionalProperties: false
      required: [id, displayName]
      properties:
        id:
          type: string
          format: uuid
          description: Stable PadlHub user identifier.
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        firstName:
          type: [string, 'null']
          maxLength: 100
        lastName:
          type: [string, 'null']
          maxLength: 100
        avatarUrl:
          type: [string, 'null']
          format: uri
    UserContext:
      type: object
      additionalProperties: false
      required: [tenantId, userId, displayName, roles, permissions]
      properties:
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        phoneLast4:
          type: string
          pattern: '^[0-9]{4}$'
          description: Last four digits only; the access JWT and context never expose the full phone.
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    HomeDashboard:
      type: object
      additionalProperties: false
      required:
        [
          snapshot,
          profile,
          counters,
          quickActions,
          upcoming,
          subscriptions,
          communities,
          promotion,
          promotions,
          locations,
          additionalLinks,
          capabilities,
        ]
      properties:
        snapshot:
          $ref: '#/components/schemas/HomeSnapshot'
        profile:
          $ref: '#/components/schemas/HomeProfile'
        counters:
          $ref: '#/components/schemas/HomeCounters'
        quickActions:
          type: array
          maxItems: 4
          items:
            $ref: '#/components/schemas/HomeQuickAction'
        upcoming:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeUpcomingItem'
        subscriptions:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeSubscription'
        communities:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/CommunitySummary'
        promotion:
          deprecated: true
          description: First active item retained during the expand/migrate compatibility window.
          oneOf:
            - $ref: '#/components/schemas/HomePromotion'
            - type: 'null'
        promotions:
          $ref: '#/components/schemas/HomePromotionDeck'
        locations:
          type: array
          maxItems: 8
          items:
            $ref: '#/components/schemas/HomeLocation'
        additionalLinks:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeAdditionalLink'
        capabilities:
          $ref: '#/components/schemas/HomeCapabilities'
    HomeSnapshot:
      type: object
      additionalProperties: false
      required: [version, generatedAt, staleAt, source]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 100
        generatedAt:
          type: string
          format: date-time
        staleAt:
          type: string
          format: date-time
        source:
          type: string
          enum: [LOCAL_PROJECTION, LOCAL_MOCK]
          description: Server-owned read-model source; clients must not branch on this value.
    HomeProfile:
      type: object
      additionalProperties: false
      required: [userId, displayName, balanceMinor, currency, level]
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        firstName:
          type: [string, 'null']
          maxLength: 100
        avatarUrl:
          type: [string, 'null']
          format: uri
        phoneLast4:
          type: string
          pattern: '^[0-9]{4}$'
        balanceMinor:
          type: integer
          description: Signed balance in minor currency units; a negative value represents debt.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
        level:
          $ref: '#/components/schemas/HomePlayerLevel'
    HomePlayerLevel:
      type: object
      additionalProperties: false
      required: [label, value, assessmentRequired]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 20
        value:
          type: number
          minimum: 0
          maximum: 10
        assessmentRequired:
          type: boolean
    HomeCounters:
      type: object
      additionalProperties: false
      required: [unreadChats, upcomingEvents, activeSubscriptions]
      properties:
        unreadChats:
          type: integer
          minimum: 0
        upcomingEvents:
          type: integer
          minimum: 0
        activeSubscriptions:
          type: integer
          minimum: 0
    HomeQuickAction:
      type: object
      additionalProperties: false
      required: [id, title, route, tone]
      properties:
        id:
          type: string
          enum: [play, group_training, tournament, individual_training]
        title:
          type: string
          minLength: 1
          maxLength: 80
        subtitle:
          type: [string, 'null']
          maxLength: 120
        route:
          type: string
          pattern: '^/'
        tone:
          type: string
          enum: [violet, lime, mint, sand]
    HomeUpcomingItem:
      type: object
      additionalProperties: false
      required: [id, kind, title, startsAt, venue, status, route]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [game, training, tournament]
        title:
          type: string
          minLength: 1
          maxLength: 160
        startsAt:
          type: string
          format: date-time
        venue:
          type: string
          minLength: 1
          maxLength: 160
        status:
          type: string
          enum: [confirmed, waitlist, payment_required]
        route:
          type: string
          pattern: '^/'
    UserUpcomingBookings:
      type: object
      additionalProperties: false
      required: [version, generatedAt, staleAt, items]
      properties:
        version:
          type: string
          minLength: 1
          maxLength: 100
        generatedAt:
          type: string
          format: date-time
        staleAt:
          type: string
          format: date-time
        items:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/HomeUpcomingItem'
    HomeSubscription:
      type: object
      additionalProperties: false
      required: [id, title, status, remainingUnits, validUntil, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 160
        status:
          type: string
          enum: [active, scheduled, paused, exhausted, expired]
        remainingUnits:
          type: integer
          minimum: 0
        validUntil:
          type: [string, 'null']
          format: date-time
        route:
          type: string
          pattern: '^/'
    CommunitySummary:
      type: object
      additionalProperties: false
      required: [id, title, logoUrl, isVerified, unreadChatCount, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 120
        logoUrl:
          type: [string, 'null']
          format: uri
        isVerified:
          type: boolean
        unreadChatCount:
          type: integer
          minimum: 0
        route:
          type: string
          pattern: '^/'
    CommunityMembershipPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/CommunitySummary'
        nextCursor:
          type: string
          minLength: 16
          maxLength: 512
    HomePromotion:
      type: object
      additionalProperties: false
      required: [id, eyebrow, title, description, actionLabel, route, tone]
      properties:
        id:
          type: string
          format: uuid
        eyebrow:
          type: string
          minLength: 1
          maxLength: 40
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          minLength: 1
          maxLength: 220
        actionLabel:
          type: string
          minLength: 1
          maxLength: 60
        route:
          type: string
          minLength: 1
          maxLength: 4000
          pattern: '^(https?://|/|#|mailto:|tel:)'
        tone:
          type: string
          enum: [violet, lime, mint, sand]
        imageUrl:
          type: [string, 'null']
          format: uri
        mobileImageUrl:
          type: [string, 'null']
          format: uri
    HomePromotionDeck:
      type: object
      additionalProperties: false
      required: [rotationEnabled, intervalSeconds, items]
      properties:
        rotationEnabled:
          type: boolean
        intervalSeconds:
          type: integer
          minimum: 3
          maximum: 30
        items:
          type: array
          maxItems: 20
          items:
            $ref: '#/components/schemas/HomePromotion'
    HomeLocation:
      type: object
      additionalProperties: false
      required: [id, title, courtCount, imageUrl, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 120
        courtCount:
          type: integer
          minimum: 1
        imageUrl:
          type: [string, 'null']
          format: uri
        route:
          type: string
          pattern: '^/'
    HomeAdditionalLink:
      type: object
      additionalProperties: false
      required: [id, title, route]
      properties:
        id:
          type: string
          enum: [promotions, gift_certificates, offers]
        title:
          type: string
          minLength: 1
          maxLength: 80
        route:
          type: string
          pattern: '^/'
    HomeCapabilities:
      type: object
      additionalProperties: false
      required: [canCreateGame, canManageTournaments, canViewCommunities]
      properties:
        canCreateGame:
          type: boolean
        canManageTournaments:
          type: boolean
        canViewCommunities:
          type: boolean
    NotificationInboxPage:
      type: object
      additionalProperties: false
      required: [items, unreadCount]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/NotificationInboxItem'
        unreadCount:
          type: integer
          minimum: 0
        nextCursor:
          type: string
          minLength: 16
          maxLength: 512
    NotificationInboxItem:
      type: object
      additionalProperties: false
      required: [id, category, title, body, createdAt]
      properties:
        id:
          type: string
          format: uuid
        category:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{1,63}$'
        title:
          type: string
          minLength: 1
          maxLength: 300
        body:
          type: string
          minLength: 1
          maxLength: 8000
        deepLink:
          type: string
          pattern: '^/(?!/)'
          maxLength: 2000
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
    NotificationReadCursorRequest:
      type: object
      additionalProperties: false
      required: [throughId]
      properties:
        throughId:
          type: string
          format: uuid
    NotificationReadCursorResult:
      type: object
      additionalProperties: false
      required: [outcome, readThrough, changedCount, replayed]
      properties:
        outcome:
          type: string
          const: updated
        readThrough:
          $ref: '#/components/schemas/NotificationInboxPosition'
        changedCount:
          type: integer
          minimum: 0
        replayed:
          type: boolean
    NotificationInboxPosition:
      type: object
      additionalProperties: false
      required: [id, createdAt]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    WebPushConfiguration:
      type: object
      additionalProperties: false
      required: [enabled]
      properties:
        enabled:
          type: boolean
        publicKey:
          type: string
          minLength: 20
          maxLength: 256
          description: Public URL-safe VAPID key. No private provider credential is exposed.
        reason:
          type: string
          enum:
            [
              GLOBAL_GATE_DISABLED,
              TENANT_GATE_DISABLED,
              PROVIDER_NOT_CONFIGURED,
              RUNTIME_UNAVAILABLE,
            ]
    WebPushEndpointRegistration:
      type: object
      additionalProperties: false
      required: [installationId, subscription]
      properties:
        installationId:
          type: string
          format: uuid
        subscription:
          $ref: '#/components/schemas/WebPushSubscription'
    WebPushSubscription:
      type: object
      additionalProperties: false
      required: [endpoint, keys]
      properties:
        endpoint:
          type: string
          format: uri
          pattern: '^https://'
          maxLength: 2048
        expirationTime:
          type: [integer, 'null']
          minimum: 0
        keys:
          type: object
          additionalProperties: false
          required: [p256dh, auth]
          properties:
            p256dh:
              type: string
              minLength: 40
              maxLength: 256
              pattern: '^[A-Za-z0-9_-]+={0,2}$'
            auth:
              type: string
              minLength: 16
              maxLength: 256
              pattern: '^[A-Za-z0-9_-]+={0,2}$'
    WebPushEndpointCommandResult:
      type: object
      additionalProperties: false
      required: [outcome, endpointId, installationId, status, replayed]
      properties:
        outcome:
          type: string
          const: updated
        endpointId:
          type: string
          format: uuid
        installationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [ACTIVE, REVOKED]
        replayed:
          type: boolean
    LocationWeekday:
      type: string
      enum: [MON, TUE, WED, THU, FRI, SAT, SUN]
    LocationAmenityIcon:
      type: string
      enum:
        [
          PARKING,
          CAFE,
          CHANGING_ROOM,
          SHOWER,
          SAUNA,
          RENTAL,
          SHOP,
          ACCESSIBILITY,
          KIDS,
          LOUNGE,
          OTHER,
        ]
    LocationHoursInterval:
      type: object
      additionalProperties: false
      required: [opensAt, closesAt]
      properties:
        opensAt:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
        closesAt:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
    LocationWeeklyHoursEntry:
      type: object
      additionalProperties: false
      required: [weekday, closed, intervals]
      properties:
        weekday:
          $ref: '#/components/schemas/LocationWeekday'
        closed:
          type: boolean
        intervals:
          type: array
          maxItems: 3
          items:
            $ref: '#/components/schemas/LocationHoursInterval'
    LocationAmenity:
      type: object
      additionalProperties: false
      required: [key, icon, title, description, sortOrder]
      properties:
        key:
          type: string
          pattern: '^[a-z][a-z0-9-]{1,62}$'
        icon:
          $ref: '#/components/schemas/LocationAmenityIcon'
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: [string, 'null']
          maxLength: 300
        sortOrder:
          type: integer
          minimum: 0
          maximum: 99
    LocationGalleryImage:
      type: object
      additionalProperties: false
      required: [url, alt, isCover, sortOrder]
      properties:
        url:
          type: string
          format: uri
          pattern: '^https://'
          maxLength: 2000
        alt:
          type: string
          maxLength: 180
        isCover:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
          maximum: 99
    LocationSummary:
      type: object
      additionalProperties: false
      required: [id, title, city, courtCount, coverImageUrl, route]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 120
        city:
          type: [string, 'null']
          maxLength: 120
        courtCount:
          type: integer
          minimum: 0
        coverImageUrl:
          type: [string, 'null']
          format: uri
        route:
          type: string
          pattern: '^/'
    LocationList:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/LocationSummary'
    LocationCoordinates:
      type: object
      additionalProperties: false
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
    LocationMetro:
      type: object
      additionalProperties: false
      required: [name, distanceMeters]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 160
        distanceMeters:
          type: [integer, 'null']
          minimum: 0
    LocationDetail:
      type: object
      additionalProperties: false
      required:
        - id
        - slug
        - title
        - shortTitle
        - city
        - courtCount
        - address
        - coordinates
        - timezone
        - metro
        - phoneE164
        - gallery
        - amenities
        - workingHours
        - openNow
        - workingHoursSummary
        - navigationUrl
        - route
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
          minLength: 1
          maxLength: 120
        shortTitle:
          type: [string, 'null']
          maxLength: 80
        city:
          type: [string, 'null']
          maxLength: 120
        courtCount:
          type: integer
          minimum: 0
        address:
          type: [string, 'null']
          maxLength: 500
        coordinates:
          oneOf:
            - $ref: '#/components/schemas/LocationCoordinates'
            - type: 'null'
        timezone:
          type: string
        metro:
          oneOf:
            - $ref: '#/components/schemas/LocationMetro'
            - type: 'null'
        phoneE164:
          type: [string, 'null']
        gallery:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/LocationGalleryImage'
        amenities:
          type: array
          maxItems: 16
          items:
            $ref: '#/components/schemas/LocationAmenity'
        workingHours:
          type: array
          maxItems: 7
          items:
            $ref: '#/components/schemas/LocationWeeklyHoursEntry'
        openNow:
          type: boolean
        workingHoursSummary:
          type: string
          minLength: 1
          maxLength: 160
        navigationUrl:
          type: [string, 'null']
          format: uri
        route:
          type: string
          pattern: '^/'
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable client operation key used for retry-safe commands.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9._:-]+$'
    ChallengeId:
      name: challengeId
      in: path
      required: true
      description: Opaque PadlHub authentication challenge UUID.
      schema:
        type: string
        format: uuid
    RefreshSessionIntent:
      name: X-Session-Intent
      in: header
      required: true
      description: Explicit refresh intent required alongside the HttpOnly cookie.
      schema:
        type: string
        const: refresh
    LogoutSessionIntent:
      name: X-Session-Intent
      in: header
      required: true
      description: Explicit logout intent required alongside the HttpOnly cookie.
      schema:
        type: string
        const: logout
  headers:
    RefreshCookie:
      description: |
        Rotated or expired `phub_refresh` cookie. It is HttpOnly and SameSite;
        production also sets Secure. Browser JavaScript cannot read its value.
      required: true
      schema:
        type: string
  responses:
    CommandConflict:
      description: The idempotency key was already used for another command.
      headers:
        X-Correlation-ID:
          $ref: ../../common/components.yaml#/components/headers/CorrelationId
      content:
        application/json:
          schema:
            $ref: ../../common/components.yaml#/components/schemas/ApiError
    AuthenticationRejected:
      description: The challenge, refresh cookie or PadlHub session credential is invalid.
      headers:
        X-Correlation-ID:
          $ref: ../../common/components.yaml#/components/headers/CorrelationId
      content:
        application/json:
          schema:
            $ref: ../../common/components.yaml#/components/schemas/ApiError
  securitySchemes:
    PadlHubUserJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: PadlHub-issued JWT; audience phub-api, UUID subject and authorized tenant UUIDs.
    PadlHubRefreshCookie:
      type: apiKey
      in: cookie
      name: phub_refresh
      description: Rotating PadlHub refresh credential stored only as an HttpOnly cookie.

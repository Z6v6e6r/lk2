server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;
    absolute_redirect off;

    # Load the canonical user contract by default, but retain a user-provided URL.
    location = / {
        if ($arg_url = "") {
            return 302 /?url=/spec/user/v1/openapi.yaml;
        }

        try_files /index.html =404;
    }

    # Swagger Editor resolves the shared components from the page root.
    location ^~ /common/ {
        alias /usr/share/nginx/html/spec/common/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
